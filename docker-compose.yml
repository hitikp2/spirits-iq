version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: spirits-iq-db
    environment:
      POSTGRES_USER: spiritsiq
      POSTGRES_PASSWORD: spiritsiq_dev
      POSTGRES_DB: spirits_iq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spiritsiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spirits-iq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
